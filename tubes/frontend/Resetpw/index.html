<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campren – Reset Password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background canvas -->
  <canvas id="waveCanvas"></canvas>

  <!-- Right panel -->
  <div class="panel">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="4,32 14,18 22,24 32,8" stroke="#5b6ef5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="28,8 36,8 36,16" stroke="#5b6ef5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="logo-text">
        <span class="logo-name">CAMPREN</span>
        <span class="logo-tagline">EXPLORE. ANALYZE. GROWTH.</span>
      </div>
    </div>

    <div class="form-wrapper">
      <div class="field">
        <label for="newPassword">New Password</label>
        <div class="input-wrapper">
          <input type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password" />
          <button class="toggle-eye" data-target="newPassword" tabindex="-1" aria-label="Toggle visibility">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <span class="strength-label" id="strengthLabel"></span>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="confirmPassword" placeholder="Re-enter new password" autocomplete="new-password" />
          <button class="toggle-eye" data-target="confirmPassword" tabindex="-1" aria-label="Toggle visibility">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="match-label" id="matchLabel"></span>
      </div>

      <button class="submit-btn" id="submitBtn">
        <span class="btn-text">Make a new password</span>
        <svg class="btn-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="10" x2="17" y2="10"/>
          <polyline points="11,4 17,10 11,16"/>
        </svg>
      </button>
    </div>

    <p class="signup-link">Don't have an account? <a href="#">Sign Up</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
